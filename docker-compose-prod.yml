services:
  db:
    image: pgvector/pgvector:pg15
    container_name: devlog-postgres
    restart: always
    environment:
      - POSTGRES_DB=devlog_archive
      - POSTGRES_USER=devlog
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - devlog-network
    mem_limit: 256m

  app:
    image: ${ECR_IMAGE}
    container_name: devlog-archive
    restart: always
    ports:
      - "127.0.0.1:8082:8082"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=devlog_archive
      - DB_USERNAME=devlog
      - DB_PASSWORD=${DB_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_MODEL=text-embedding-3-small
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      - db
    networks:
      - devlog-network
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 90s

  caddy:
    image: caddy:2-alpine
    container_name: devlog-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    networks:
      - devlog-network
    mem_limit: 32m

networks:
  devlog-network:
    driver: bridge

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
