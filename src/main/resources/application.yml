server:
  port: 8082

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=3600s

openai:
  api-key: ${OPENAI_API_KEY}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  base-url: https://api.openai.com

similar:
  minimum-vector-similarity: 0.45
  strong-vector-similarity: 0.72
  minimum-final-score: 0.52
  fallback-vector-similarity: 0.40
  fallback-final-score: 0.38
  last-resort-vector-similarity: 0.42
  minimum-keyword-overlap: 0.12
  minimum-title-overlap: 0.2
  lexical-strict-score: 0.46
  max-per-blog: 2
  last-resort-lexical-weight: 0.75
  strict:
    vector: 0.62
    title-overlap: 0.16
    body-overlap: 0.08
    topic-overlap: 0.08
    phrase-score: 0.06
  fallback:
    vector-dominant: 0.75
    lexical-dominant: 0.88
  lexical:
    title-overlap: 0.34
    body-overlap: 0.2
    topic-overlap: 0.3
    phrase-score: 0.16
  strong-vector:
    vector-weight: 0.88
    lexical-weight: 0.12
  lexical-only:
    multiplier: 0.92
    minimum-phrase-score: 0.5
    minimum-topic-overlap: 0.5
  fallback-eligibility:
    minimum-lexical-score: 0.30
    minimum-phrase-score: 0.40
    minimum-topic-overlap: 0.25

admin:
  api-key: ${ADMIN_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
